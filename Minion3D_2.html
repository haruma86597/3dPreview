<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minion3D_2.glb</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #f4f4f5;
            /* シンプルな背景色 */
            overflow: hidden;
            /* スクロールバーを隠す */
        }

        /* ビュアーを画面全体に広げる */
        model-viewer {
            width: 100%;
            height: 100%;
        }
    </style>
    <!-- Googleのmodel-viewerライブラリをCDNから読み込む -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
</head>

<body>
    <model-viewer src="Minion3D_2.glb" camera-controls shadow-intensity="1" exposure="0.9">
    </model-viewer>
</body>

</html>
